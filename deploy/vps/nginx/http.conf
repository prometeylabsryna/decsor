# HTTP — led-leader.com.ua (до certbot; після SSL certbot додасть 443 блок)
# /etc/nginx/sites-available/itmcopy

upstream itmcopy_gunicorn {
    server 127.0.0.1:8001 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name led-leader.com.ua www.led-leader.com.ua 178.20.157.42;

    client_max_body_size 20M;

    access_log /var/log/nginx/itmcopy.access.log;
    error_log  /var/log/nginx/itmcopy.error.log;

    location /static/ {
        alias /var/www/itmcopy/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/itmcopy/media/;
        expires 7d;
    }

    location /healthz/ {
        proxy_pass http://itmcopy_gunicorn;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://itmcopy_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}
