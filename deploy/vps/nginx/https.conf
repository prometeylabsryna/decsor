# HTTPS — led-leader.com.ua (після certbot)
# certbot --nginx -d led-leader.com.ua -d www.led-leader.com.ua
# Або вручну: cp deploy/vps/nginx/https.conf /etc/nginx/sites-available/itmcopy

upstream itmcopy_gunicorn {
    server 127.0.0.1:8001 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name led-leader.com.ua www.led-leader.com.ua 178.20.157.42;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name led-leader.com.ua www.led-leader.com.ua;

    ssl_certificate     /etc/letsencrypt/live/led-leader.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/led-leader.com.ua/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    access_log /var/log/nginx/itmcopy.access.log;
    error_log  /var/log/nginx/itmcopy.error.log;

    location /static/ {
        alias /var/www/itmcopy/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/itmcopy/media/;
        expires 7d;
    }

    location /healthz/ {
        proxy_pass http://itmcopy_gunicorn;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://itmcopy_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}
