<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70">
  <rect width="220" height="70" rx="8" fill="#FF5500"/>
  <!-- Running figure with box -->
  <g fill="#ffffff">
    <!-- Head -->
    <circle cx="28" cy="14" r="7"/>
    <!-- Body leaning forward -->
    <path d="M16 26 Q20 22 28 22 Q36 22 40 26 L44 42 L36 42 L32 30 L26 36 L20 50 L12 50 L20 38 Z"/>
    <!-- Box being carried -->
    <rect x="40" y="16" width="16" height="16" rx="2"/>
    <line x1="40" y1="24" x2="56" y2="24" stroke="#FF5500" stroke-width="1.5"/>
    <line x1="48" y1="16" x2="48" y2="32" stroke="#FF5500" stroke-width="1.5"/>
    <!-- Speed lines -->
    <rect x="6" y="34" width="10" height="3" rx="1.5" opacity="0.7"/>
    <rect x="4" y="40" width="7" height="3" rx="1.5" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="76" y="37" font-family="Arial Black,Arial,sans-serif" font-size="21" font-weight="900" fill="#ffffff">Delivery</text>
</svg>
