<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70">
  <rect width="220" height="70" rx="8" fill="#E31E24"/>
  <!-- NP monogram: two bold letters -->
  <g font-family="Arial Black,Impact,sans-serif" font-weight="900" fill="#ffffff">
    <!-- N letter -->
    <rect x="14" y="18" width="7" height="34"/>
    <polygon points="14,18 21,18 40,44 40,52 33,52 14,26"/>
    <rect x="33" y="18" width="7" height="34"/>
    <!-- P letter -->
    <rect x="50" y="18" width="7" height="34"/>
    <path d="M57 18 Q73 18 73 29 Q73 40 57 40 L57 34 Q67 34 67 29 Q67 24 57 24 Z"/>
  </g>
  <!-- Wordmark -->
  <text x="88" y="30" font-family="Arial Black,Arial,sans-serif" font-size="13" font-weight="900" fill="#ffffff">NOVA</text>
  <text x="88" y="48" font-family="Arial Black,Arial,sans-serif" font-size="13" font-weight="900" fill="#ffffff">POSHTA</text>
</svg>
